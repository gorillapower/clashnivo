<%+cbi/valueheader%>
<%
	local fs = require "luci.clashnivo"
	local filename = fs.filename(self:cfgvalue(section)) or "config"
	local idname = math.random(1000) .. (string.match(filename, "[%w_]+") or "")
%>
<script type="text/javascript">//<![CDATA[
	function cn_update_<%=idname%>(btn) {
		btn.disabled = true;
		var original = btn.value;
		btn.value = '<%:Updating...%>';
		XHR.get('<%=luci.dispatcher.build_url("admin", "services", "clashnivo", "update_config")%>',
			{ filename: "<%=filename%>" },
			function(x, status) {
				btn.disabled = false;
				btn.value = original;
				if (!(x && x.status == 200 && status && status.status === 'success')) {
					alert('<%:Update failed%>' + (status && status.message ? ': ' + status.message : ''));
				}
			});
		return false;
	};
//]]></script>
<input type="button" class="btn cbi-button cbi-input-reload"
	value="<%:Update%>" onclick="return cn_update_<%=idname%>(this)" />
<%+cbi/valuefooter%>
